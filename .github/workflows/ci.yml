name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run project checks
        run: npm run check

  browser:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  database:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start local Postgres
        run: npm run supabase:start
      - name: Reset local database
        run: npm run db:reset
      - name: Run database lint and tests
        run: npm run db:lint && npm run db:test
      - name: Check generated database types
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if output="$(npm run db:types:check 2>&1)"; then
              printf '%s\n' "$output"
              exit 0
            else
              status=$?
              printf '%s\n' "$output"
            fi

            if ! grep -Eiq 'toomanyrequests|Rate exceeded' <<<"$output" || [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            delay=$((attempt * 15))
            echo "Transient container registry rate limit; retrying database type check in ${delay}s."
            sleep "$delay"
          done
      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
